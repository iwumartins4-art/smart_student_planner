name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 pbxproj sh cookiecutter pillow

      - name: Install macOS/iOS Build Tools (Homebrew)
        run: |
          brew install autoconf automake libtool pkg-config
          brew link libtool

      - name: Build iOS Xcode Project with Buildozer
        # This will take a long time (30+ mins) as it compiles Python and Kivy from C source code for iOS arm64.
        # || true is added because sometimes buildozer throws a non-fatal warning at the end that causes GH to fail.
        run: |
          buildozer ios debug || true

      - name: Locate and Package Xcode Project
        run: |
          echo "Packaging the final Xcode project..."
          # The iOS project is generated deep inside .buildozer
          cd .buildozer/ios/platform/kivy-ios
          # We zip the entire project folder generated
          zip -r ../../../../ios-project-source.zip smart_student_planner-ios/

      - name: Upload iOS Xcode Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: ios-project-source.zip
