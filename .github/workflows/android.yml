name: Android Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libsqlite3-dev
          pip install --upgrade pip
          # Use Cython < 3.0 to match the newest Buildozer requirements
          pip install git+https://github.com/kivy/buildozer.git@master colorama
          pip install "cython>=0.29.33,<3.0.0"

      - name: Manual SDK Setup
        run: |
          # Create a writable SDK root in the home directory
          mkdir -p $HOME/android-sdk
          # Download API 33 components AND cmdline-tools
          # We need cmdline-tools so Buildozer recognizes this as a "Real" SDK
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33" "build-tools;33.0.0" "platform-tools" "cmdline-tools;latest" > /dev/null

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          # Increment to v23 for the absolute final attempt
          key: ${{ runner.os }}-buildozer-v23-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v23-

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          
          # SURGICAL HIJACK: Final alignment
          mkdir -p .buildozer/android/platform/
          rm -rf .buildozer/android/platform/android-sdk
          ln -s $HOME/android-sdk .buildozer/android/platform/android-sdk
          
          # Final build command
          buildozer -v android debug
        env:
          USER: runner
          ANDROID_SDK_ROOT: /home/runner/android-sdk
          ANDROIDSDK: /home/runner/android-sdk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudentPlanner-APK
          path: bin/*.apk
