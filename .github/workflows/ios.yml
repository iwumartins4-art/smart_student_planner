name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 pbxproj sh cookiecutter pillow packaging

      - name: Install macOS/iOS Build Tools (Homebrew)
        run: |
          brew install autoconf automake libtool pkg-config
          brew link libtool

      - name: Bypass PyCairo Compilation (iOS Workaround)
        run: |
          echo "Removing KivyMD from buildozer.spec requirements to prevent pip pycairo crash..."
          sed -i '' 's|https://github.com/kivymd/KivyMD/archive/master.zip, ||g' buildozer.spec
          sed -i '' 's|materialyoucolor, ||g' buildozer.spec
          sed -i '' 's|asynckivy, ||g' buildozer.spec
          sed -i '' 's|asyncgui, ||g' buildozer.spec
          sed -i '' 's|exceptiongroup, ||g' buildozer.spec
          sed -i '' 's|android, ||g' buildozer.spec
          
          echo "Bundling KivyMD and pure Python dependencies locally..."
          pip install https://github.com/kivymd/KivyMD/archive/master.zip materialshapes materialyoucolor asynckivy asyncgui exceptiongroup --no-deps -t ./
          
          echo "Cleaning up dist-info metadata to save bundle space..."
          rm -rf *.dist-info

      - name: Build iOS Xcode Project (Native Kivy-iOS)
        # This bypasses Buildozer's buggy ios-deploy compilation entirely
        run: |
          echo "Installing Kivy-iOS toolchain..."
          git clone https://github.com/kivy/kivy-ios.git
          cd kivy-ios
          pip install -e .
          
          echo "Building Python, Kivy, and Pillow for iOS..."
          python3 toolchain.py build python3 kivy pillow
          
          echo "Creating Xcode Project..."
          python3 toolchain.py create "SmartStudentPlanner" ../
          
      - name: Locate and Package Xcode Project
        run: |
          echo "Packaging the final Xcode project..."
          cd kivy-ios
          zip -r ../ios-project-source.zip smartstudentplanner-ios/

      - name: Upload iOS Xcode Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: ios-project-source.zip
