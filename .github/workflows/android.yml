name: Android Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libsqlite3-dev
          pip install --upgrade pip
          # Use Cython < 3.0 to match the newest Buildozer requirements
          pip install git+https://github.com/kivy/buildozer.git@master colorama
          pip install "cython>=0.29.33,<3.0.0"

      - name: Manual SDK Setup
        run: |
          # Create a writable SDK root in the home directory
          mkdir -p $HOME/android-sdk
          # Download API 33 components into our writable folder
          # This ensures we have a "private" SDK that won't be blocked by permissions
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33" "build-tools;33.0.0" "platform-tools"

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          # Increment to v3 to purge any state from the failed Build #18
          key: ${{ runner.os }}-buildozer-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v3-

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          
          # HIJACK AUDIT: Verify the manual SDK contains API 33
          echo "HIJACK AUDIT: Listing manual SDK content..."
          [ -d "$HOME/android-sdk/platforms/android-33" ] && echo "SUCCESS: API 33 found in manual SDK." || echo "ERROR: API 33 MISSING!"
          
          # Final build command with EXPLICIT SDK paths to force p4a's hand
          buildozer -v android debug
        env:
          USER: runner
          ANDROIDSDK: /home/runner/android-sdk
          ANDROID_SDK_ROOT: /home/runner/android-sdk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudentPlanner-APK
          path: bin/*.apk
