name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 pbxproj sh cookiecutter pillow packaging

      - name: Install macOS/iOS Build Tools (Homebrew)
        run: |
          brew install autoconf automake libtool pkg-config
          brew link libtool

      - name: Bypass PyCairo Compilation (iOS Workaround)
        run: |
          echo "Removing KivyMD from buildozer.spec requirements to prevent pip pycairo crash..."
          sed -i '' 's|https://github.com/kivymd/KivyMD/archive/master.zip, ||g' buildozer.spec
          sed -i '' 's|materialyoucolor, ||g' buildozer.spec
          sed -i '' 's|asynckivy, ||g' buildozer.spec
          sed -i '' 's|asyncgui, ||g' buildozer.spec
          sed -i '' 's|exceptiongroup, ||g' buildozer.spec
          sed -i '' 's|android, ||g' buildozer.spec
          
          echo "Bundling KivyMD and pure Python dependencies locally..."
          pip install https://github.com/kivymd/KivyMD/archive/master.zip materialshapes materialyoucolor asynckivy asyncgui exceptiongroup --no-deps -t ./
          
          echo "Cleaning up dist-info metadata to save bundle space..."
          rm -rf *.dist-info

      - name: Build iOS Xcode Project (Native Kivy-iOS)
        # This bypasses Buildozer's buggy ios-deploy compilation entirely
        run: |
          echo "Installing Kivy-iOS toolchain..."
          git clone https://github.com/kivy/kivy-ios.git
          cd kivy-ios
          pip install -e .
          
          echo "Building Python, Kivy, and Pillow for iOS..."
          python3 toolchain.py build python3 kivy pillow
          
          echo "Creating Xcode Project..."
          python3 toolchain.py create "SmartStudentPlanner" ../
          
      - name: iOS Headless Simulator Smoke Test
        run: |
          echo "Compiling for iOS Simulator (iphonesimulator)..."
          # Navigate to root where the Xcode project was generated
          cd ..
          # Build the simulator binary without code signing, outputting to a known SYMROOT
          xcodebuild -project smartstudentplanner-ios/smartstudentplanner.xcodeproj -scheme smartstudentplanner -destination 'platform=iOS Simulator,name=iPhone 15' -configuration Debug SYMROOT=$(PWD)/build build CODE_SIGNING_ALLOWED=NO
          
          echo "Booting Headless iPhone 15 Simulator..."
          xcrun simctl boot "iPhone 15" || true
          
          echo "Installing App payload into Simulator..."
          xcrun simctl install "iPhone 15" build/Debug-iphonesimulator/smartstudentplanner.app
          
          echo "Launching App and monitoring for crashes (20s)..."
          # Launch in console mode, pipe to file, run in background
          xcrun simctl launch --console "iPhone 15" org.kivy.smartstudentplanner > simulator_log.txt 2>&1 &
          
          # Wait 20 seconds for Kivy initialization and database creation
          sleep 20
          
          echo "Analyzing Simulator Logs:"
          cat simulator_log.txt
          
          if grep -q "Traceback (most recent call last)" simulator_log.txt; then
            echo "::error::Python Traceback detected in Simulator! The app crashed."
            exit 1
          elif grep -q "PermissionError" simulator_log.txt; then
            echo "::error::PermissionError detected in Simulator!"
            exit 1
          else
            echo "✅ Smoke Test Passed! No Python fatal errors detected."
          fi
          

      - name: Locate and Package Xcode Project
        run: |
          echo "Packaging the final Xcode project..."
          cd kivy-ios
          zip -r ../ios-project-source.zip smartstudentplanner-ios/

      - name: Upload iOS Xcode Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: ios-project-source.zip
