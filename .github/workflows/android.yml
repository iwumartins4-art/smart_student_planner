name: Android Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libsqlite3-dev
          pip install --upgrade pip
          # Install latest Buildozer and correct Cython version
          pip install git+https://github.com/kivy/buildozer.git@master colorama
          pip install --upgrade "cython>=3.0.0,<3.1.0"

      - name: Manual SDK Setup
        run: |
          # Create a writable SDK root in the home directory
          mkdir -p $HOME/android-sdk
          # Use system tool to install missing API 33 components into our writable folder
          # This bypasses Buildozer's own downloader bugs
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33" "build-tools;33.0.0" "platform-tools" > /dev/null

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          # Reset cache to v2 to purge poisoned/corrupt state
          key: ${{ runner.os }}-buildozer-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v2-

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          
          # SURGICAL HIJACK: Force Buildozer to use our manual SDK
          # 1. Pre-create the exact internal directory layout Buildozer wants
          mkdir -p .buildozer/android/platform/
          
          # 2. Symlink our writable home SDK into the project's internal folder
          # This "tricks" Buildozer into seeing the SDK as already installed
          rm -rf .buildozer/android/platform/android-sdk
          ln -s $HOME/android-sdk .buildozer/android/platform/android-sdk
          
          # 3. Diagnostic Folder Audit
          echo "HIJACK AUDIT: Listing internal SDK content..."
          [ -d ".buildozer/android/platform/android-sdk/platforms" ] && ls -la .buildozer/android/platform/android-sdk/platforms || echo "ERROR: SDK not found at hijack path!"
          
          # Final build command
          buildozer -v android debug
        env:
          USER: runner

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudentPlanner-APK
          path: bin/*.apk
