name: Android Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libsqlite3-dev
          pip install --upgrade pip
          # Install Buildozer first, then force the correct Cython version for Kivy 2.3.1
          pip install git+https://github.com/kivy/buildozer.git@master colorama
          pip install --upgrade "cython>=3.0.0,<3.1.0"
          # Pre-accept SDK licenses and ensure sdkmanager is usable
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin
          yes | sdkmanager --licenses || true

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build with Buildozer
        run: |
          # Ensure buildozer is in PATH
          export PATH=$PATH:~/.local/bin
          # Unset conflicting system SDK paths to force Buildozer to use its own local writable SDK
          unset ANDROID_HOME
          unset ANDROID_SDK_ROOT
          # Run buildozer in debug mode
          buildozer -v android debug
        env:
          USER: runner

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudentPlanner-APK
          path: bin/*.apk
